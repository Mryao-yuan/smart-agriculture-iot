name: IoT 农业数据自动同步

on:
  schedule:
    - cron: '*/10 * * * *' # 每 10 分钟执行一次
  workflow_dispatch: # 允许网页端手动触发

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install pymysql cryptography requests streamlit

      - name: 生成安全连接配置
        run: |
          mkdir -p .streamlit
          cat <<EOF > .streamlit/secrets.toml
          [tidb]
          host = "${{ secrets.TIDB_HOST }}"
          port = 4000
          user = "${{ secrets.TIDB_USER }}"
          password = "${{ secrets.TIDB_PASSWORD }}"
          database = "iot_data"
          EOF

      - name: 运行同步脚本
        run: python sync_once.py
